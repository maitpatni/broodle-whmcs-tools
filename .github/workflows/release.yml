name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release zip
        run: |
          mkdir -p release/modules/addons/broodle_whmcs_tools
          cp -r modules/addons/broodle_whmcs_tools/* release/modules/addons/broodle_whmcs_tools/
          cd release
          zip -r ../broodle-whmcs-tools-${{ github.ref_name }}.zip modules/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: broodle-whmcs-tools-${{ github.ref_name }}.zip
          generate_release_notes: true
